slug: sports-betting
version: "1.0.0"
name: Sports Betting Stats
vertical:
  slug: sports-betting
  name: Sports Betting Stats
  domain: propstatfacts.example.com   # placeholder — set the real domain before deploy
dataset:
  slug: team-trends
  adapter: csv
  # SAMPLE snapshot for the shipped pack. Production: SQL adapter against the owned
  # eventheodds stats DB (odds/props/line movement/CLV) — the Tier-1 data moat.
  file: data/team_trends.csv
  entity_key: team_slug
page_types:
  - type: trend-report
    prompt: prompts/trend_report.txt
    slots: [sb-hero-cta]
slots:
  - slug: sb-hero-cta
    description: Primary sportsbook CTA on trend pages (geo-gated at redirect)
test_cell:
  slug: sports-betting-cell-1
  page_target: 30
min_facts_per_page: 6
uniqueness_cosine_ceiling: 0.85
traffic:
  audience: US sports bettors researching team trends and stats
  country: US
  seed_keywords:
    - nba ats trends
    - nfl over under trends
    - team betting trends tonight
  competitors:
    - teamrankings.com
    - covers.com
    - actionnetwork.com
  intents: [review, comparison, best]
  daily_publish_limit: 3
  min_opportunity_score: 0.35
